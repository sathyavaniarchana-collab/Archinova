<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archinova — Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="logo.jpeg" />
    <style>
      :root {
        --teal: #1a9e8f;
        --teal-deep: #0d6e63;
        --ink: #070d1a;
        --text: #e8edf5;
        --muted: rgba(232, 237, 245, 0.45);
        --surface: rgba(10, 22, 40, 0.6);
        --border: rgba(232, 237, 245, 0.08);
        --red: #f87171;
        --gold: #f5c542;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--ink);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
      }

      /* BG */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(90px);
        pointer-events: none;
        z-index: 0;
      }
      .orb-1 {
        width: 500px;
        height: 500px;
        background: rgba(61, 0, 112, 0.18);
        top: -100px;
        left: -150px;
        animation: orbFloat 14s ease-in-out infinite;
      }
      .orb-2 {
        width: 400px;
        height: 400px;
        background: rgba(0, 201, 167, 0.08);
        bottom: -80px;
        right: -100px;
        animation: orbFloat 10s ease-in-out infinite reverse;
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(30px, 25px);
        }
      }
      .grid-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(0, 201, 167, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 201, 167, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
      }

      /* TOPBAR */
      .topbar {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 32px;
        background: rgba(7, 13, 26, 0.92);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(12px);
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .topbar-logo {
        font-family: "Cormorant Garamond", serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.08em;
      }
      .topbar-logo span {
        color: var(--teal);
      }
      .admin-badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: var(--red);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        padding: 5px 14px;
        border-radius: 999px;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .admin-email {
        font-size: 13px;
        color: var(--muted);
      }
      .btn-logout {
        padding: 8px 18px;
        border-radius: 8px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: var(--red);
        font-size: 12px;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .btn-logout:hover {
        background: rgba(239, 68, 68, 0.2);
      }

      /* PAGE */
      .page {
        position: relative;
        z-index: 2;
        max-width: 1100px;
        margin: 0 auto;
        padding: 36px 24px 80px;
      }

      /* DASH TABS */
      .dash-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 32px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 5px;
      }
      .dash-tab {
        flex: 1;
        padding: 11px 16px;
        background: transparent;
        border: none;
        border-radius: 8px;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.25s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .dash-tab.active {
        background: linear-gradient(135deg, #3d0070, #00c9a7);
        color: #fff;
        box-shadow: 0 4px 16px rgba(0, 201, 167, 0.25);
      }
      .dash-tab:not(.active):hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
      }
      .tab-pane {
        display: none;
      }
      .tab-pane.active {
        display: block;
      }

      /* STATS ROW */
      .stats-row {
        display: grid;
        gap: 16px;
        margin-bottom: 28px;
      }
      .cols-3 {
        grid-template-columns: repeat(3, 1fr);
      }
      .cols-4 {
        grid-template-columns: repeat(4, 1fr);
      }
      @media (max-width: 700px) {
        .cols-3,
        .cols-4 {
          grid-template-columns: 1fr 1fr;
        }
      }
      @media (max-width: 440px) {
        .cols-3,
        .cols-4 {
          grid-template-columns: 1fr;
        }
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px 24px;
        backdrop-filter: blur(16px);
      }
      .stat-card.ac-teal {
        border-color: rgba(0, 201, 167, 0.3);
      }
      .stat-card.ac-red {
        border-color: rgba(239, 68, 68, 0.25);
      }
      .stat-card.ac-gold {
        border-color: rgba(245, 197, 66, 0.25);
      }
      .stat-card.ac-purple {
        border-color: rgba(140, 80, 255, 0.25);
      }
      .stat-icon {
        font-size: 17px;
        margin-bottom: 8px;
      }
      .stat-icon.teal {
        color: var(--teal);
      }
      .stat-icon.red {
        color: var(--red);
      }
      .stat-icon.gold {
        color: var(--gold);
      }
      .stat-icon.purple {
        color: #a78bfa;
      }
      .stat-label {
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .stat-value {
        font-family: "Cormorant Garamond", serif;
        font-size: 34px;
        font-weight: 600;
        color: var(--teal);
        line-height: 1;
      }
      .stat-value.red {
        color: var(--red);
      }
      .stat-value.gold {
        color: var(--gold);
      }
      .stat-value.purple {
        color: #a78bfa;
      }

      /* SECTION HEADER */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .section-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-title i {
        color: var(--teal);
        font-size: 16px;
      }
      .filter-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .filter-btn {
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 12px;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        transition: all 0.2s;
      }
      .filter-btn.active,
      .filter-btn:hover {
        background: rgba(0, 201, 167, 0.1);
        border-color: rgba(0, 201, 167, 0.3);
        color: var(--teal);
      }

      /* MESSAGES */
      #messagesContainer {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .msg-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px 26px;
        backdrop-filter: blur(16px);
        transition: border-color 0.2s;
      }
      .msg-card:hover {
        border-color: rgba(0, 201, 167, 0.3);
      }
      .msg-card.unread {
        border-left: 3px solid var(--teal);
      }
      .msg-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .msg-name {
        font-weight: 500;
        font-size: 15px;
      }
      .msg-meta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 3px;
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .msg-meta i {
        color: var(--teal);
        margin-right: 4px;
      }
      .msg-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        flex-shrink: 0;
      }
      .msg-time {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
      }
      .badge {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 3px 10px;
        border-radius: 999px;
      }
      .badge-unread {
        background: rgba(0, 201, 167, 0.12);
        color: var(--teal);
        border: 1px solid rgba(0, 201, 167, 0.25);
      }
      .badge-read {
        background: rgba(232, 237, 245, 0.06);
        color: var(--muted);
        border: 1px solid rgba(232, 237, 245, 0.1);
      }
      .badge-subject {
        background: rgba(61, 0, 112, 0.2);
        color: rgba(180, 140, 255, 0.9);
        border: 1px solid rgba(61, 0, 112, 0.4);
      }
      .msg-body {
        font-size: 14px;
        color: rgba(232, 237, 245, 0.75);
        line-height: 1.6;
        margin-bottom: 14px;
      }
      .msg-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn-action {
        padding: 7px 16px;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .btn-action.mark-read {
        border-color: rgba(0, 201, 167, 0.2);
      }
      .btn-action.mark-read:hover {
        background: rgba(0, 201, 167, 0.1);
        color: var(--teal);
      }
      .btn-action.delete-msg {
        border-color: rgba(239, 68, 68, 0.2);
      }
      .btn-action.delete-msg:hover {
        background: rgba(239, 68, 68, 0.1);
        color: var(--red);
      }

      /* CHART */
      .chart-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px;
        backdrop-filter: blur(16px);
        margin-bottom: 28px;
      }
      .chart-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 17px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text);
      }
      .chart-title i {
        color: var(--teal);
      }
      .bar-chart {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        height: 110px;
      }
      .bar-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }
      .bar {
        width: 100%;
        border-radius: 4px 4px 0 0;
        background: linear-gradient(
          180deg,
          rgba(0, 201, 167, 0.8),
          rgba(0, 201, 167, 0.2)
        );
        min-height: 4px;
        transition: height 0.6s ease;
      }
      .bar-label {
        font-size: 10px;
        color: var(--muted);
      }
      .bar-val {
        font-size: 11px;
        color: var(--teal);
        font-weight: 500;
      }

      /* USER CARDS */
      .users-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .user-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 22px;
        backdrop-filter: blur(16px);
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 0 18px;
        align-items: center;
        transition: border-color 0.2s;
        cursor: pointer;
      }
      .user-card:hover {
        border-color: rgba(0, 201, 167, 0.35);
      }
      .user-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3d0070, #00c9a7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        flex-shrink: 0;
      }
      .user-info {
        min-width: 0;
      }
      .user-name {
        font-size: 15px;
        font-weight: 500;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .user-email {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .user-joined {
        font-size: 11px;
        color: rgba(0, 201, 167, 0.5);
        margin-top: 2px;
      }
      .user-stats {
        display: flex;
        gap: 14px;
        align-items: center;
        flex-shrink: 0;
      }
      .user-stat {
        text-align: center;
      }
      .user-stat-val {
        font-family: "Cormorant Garamond", serif;
        font-size: 22px;
        font-weight: 600;
        color: var(--teal);
        line-height: 1;
      }
      .user-stat-val.gold {
        color: var(--gold);
      }
      .user-stat-lbl {
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 2px;
      }
      .user-divider {
        width: 1px;
        height: 30px;
        background: var(--border);
      }

      /* DESIGNS GRID */
      .designs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 14px;
      }
      .design-thumb {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        transition:
          border-color 0.2s,
          transform 0.2s;
      }
      .design-thumb:hover {
        border-color: rgba(0, 201, 167, 0.3);
        transform: translateY(-2px);
      }
      .design-thumb.fav {
        border-color: rgba(245, 197, 66, 0.35);
      }
      .design-thumb img {
        width: 100%;
        height: 130px;
        object-fit: cover;
        display: block;
        background: rgba(0, 0, 0, 0.2);
      }
      .design-no-img {
        height: 130px;
        background: rgba(0, 0, 0, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 28px;
      }
      .design-thumb-info {
        padding: 12px 14px;
      }
      .design-thumb-room {
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 5px;
      }
      .design-thumb-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 7px;
      }
      .dtag {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(61, 0, 112, 0.2);
        color: rgba(180, 140, 255, 0.9);
        border: 1px solid rgba(61, 0, 112, 0.3);
      }
      .dtag.teal {
        background: rgba(0, 201, 167, 0.1);
        color: var(--teal);
        border-color: rgba(0, 201, 167, 0.2);
      }
      .design-meta {
        font-size: 11px;
        color: var(--muted);
      }
      .fav-star {
        color: var(--gold);
      }

      /* SEARCH */
      .search-bar {
        position: relative;
        margin-bottom: 18px;
      }
      .search-bar input {
        width: 100%;
        padding: 11px 16px 11px 40px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        outline: none;
        transition: border-color 0.3s;
      }
      .search-bar input:focus {
        border-color: var(--teal);
      }
      .search-bar input::placeholder {
        color: var(--muted);
      }
      .search-bar i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 13px;
        pointer-events: none;
      }

      /* MODAL */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 999;
        background: rgba(14, 0, 32, 0.85);
        backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: rgba(18, 5, 40, 0.98);
        border: 1px solid rgba(0, 201, 167, 0.2);
        border-radius: 18px;
        padding: 32px;
        max-width: 740px;
        width: 100%;
        max-height: 85vh;
        overflow-y: auto;
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
      }
      .modal-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 22px;
      }
      .modal-close {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 18px;
        cursor: pointer;
        transition: color 0.2s;
        padding: 4px;
      }
      .modal-close:hover {
        color: var(--text);
      }
      .modal-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
        gap: 12px;
        margin-top: 16px;
      }
      .modal-img {
        width: 100%;
        height: 110px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid var(--border);
        display: block;
      }

      /* STATE */
      .state-msg {
        text-align: center;
        padding: 56px 20px;
        color: var(--muted);
        font-size: 14px;
      }
      .state-msg i {
        display: block;
        font-size: 34px;
        margin-bottom: 12px;
        color: rgba(0, 201, 167, 0.25);
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .fa-spin {
        animation: spin 1s linear infinite;
      }
    </style>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-bg"></div>

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-logo">Archi<span>nova</span></div>
        <div class="admin-badge">
          <i class="fa-solid fa-shield-halved"></i> Admin Panel
        </div>
      </div>
      <div class="topbar-right">
        <span class="admin-email" id="adminEmailDisplay"></span>
        <button class="btn-logout" onclick="logout()">
          <i class="fa-solid fa-right-from-bracket"></i> Sign Out
        </button>
      </div>
    </div>

    <div class="page">
      <!-- TABS -->
      <div class="dash-tabs">
        <button
          class="dash-tab active"
          id="tabMessages"
          onclick="switchTab('Messages')"
        >
          <i class="fa-regular fa-envelope"></i> Messages
        </button>
        <button class="dash-tab" id="tabUsers" onclick="switchTab('Users')">
          <i class="fa-solid fa-users"></i> Users &amp; Designs
        </button>
      </div>

      <!-- ══ MESSAGES TAB ══ -->
      <div class="tab-pane active" id="paneMessages">
        <div class="stats-row cols-3">
          <div class="stat-card ac-teal">
            <div class="stat-icon teal">
              <i class="fa-solid fa-envelope-open-text"></i>
            </div>
            <div class="stat-label">Total Messages</div>
            <div class="stat-value" id="statTotal">—</div>
          </div>
          <div class="stat-card ac-red">
            <div class="stat-icon red"><i class="fa-solid fa-bell"></i></div>
            <div class="stat-label">Unread</div>
            <div class="stat-value red" id="statUnread">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon teal">
              <i class="fa-solid fa-circle-check"></i>
            </div>
            <div class="stat-label">Read</div>
            <div class="stat-value" id="statRead">—</div>
          </div>
        </div>

        <div class="section-header">
          <div class="section-title">
            <i class="fa-regular fa-envelope"></i> Inbox
          </div>
          <div class="filter-row">
            <button class="filter-btn active" onclick="setFilter('all', this)">
              All
            </button>
            <button class="filter-btn" onclick="setFilter('unread', this)">
              Unread
            </button>
            <button class="filter-btn" onclick="setFilter('read', this)">
              Read
            </button>
          </div>
        </div>
        <div id="messagesContainer">
          <div class="state-msg">
            <i class="fa-solid fa-spinner fa-spin"></i>Loading messages…
          </div>
        </div>
      </div>

      <!-- ══ USERS & DESIGNS TAB ══ -->
      <div class="tab-pane" id="paneUsers">
        <!-- STATS -->
        <div class="stats-row cols-4">
          <div class="stat-card ac-teal">
            <div class="stat-icon teal"><i class="fa-solid fa-users"></i></div>
            <div class="stat-label">Total Users</div>
            <div class="stat-value" id="uStatUsers">—</div>
          </div>
          <div class="stat-card ac-purple">
            <div class="stat-icon purple">
              <i class="fa-solid fa-layer-group"></i>
            </div>
            <div class="stat-label">Saved Designs</div>
            <div class="stat-value purple" id="uStatDesigns">—</div>
          </div>
          <div class="stat-card ac-gold">
            <div class="stat-icon gold"><i class="fa-solid fa-star"></i></div>
            <div class="stat-label">Favourites</div>
            <div class="stat-value gold" id="uStatFavs">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon teal">
              <i class="fa-solid fa-chart-line"></i>
            </div>
            <div class="stat-label">Avg per User</div>
            <div class="stat-value" id="uStatAvg">—</div>
          </div>
        </div>

        <!-- ACTIVITY CHART -->
        <div class="chart-card">
          <div class="chart-title">
            <i class="fa-solid fa-chart-bar"></i> Designs Saved — Last 7 Days
          </div>
          <div class="bar-chart" id="activityChart">
            <div
              class="state-msg"
              style="padding: 0; width: 100%; font-size: 13px"
            >
              <i
                class="fa-solid fa-spinner fa-spin"
                style="display: inline; font-size: 14px"
              ></i>
              Loading…
            </div>
          </div>
        </div>

        <!-- USERS LIST -->
        <div class="section-header">
          <div class="section-title">
            <i class="fa-solid fa-user-circle"></i> All Users
          </div>
          <span id="userCount" style="font-size: 12px; color: var(--muted)"
            >Loading…</span
          >
        </div>
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
            type="text"
            id="userSearch"
            placeholder="Search by name or email…"
            oninput="filterUsers()"
          />
        </div>
        <div class="users-grid" id="usersGrid">
          <div class="state-msg">
            <i class="fa-solid fa-spinner fa-spin"></i>Loading users…
          </div>
        </div>

        <!-- ALL DESIGNS -->
        <div style="margin-top: 40px">
          <div class="section-header">
            <div class="section-title">
              <i class="fa-solid fa-images"></i> All Saved Designs
            </div>
            <div class="filter-row">
              <button
                class="filter-btn active"
                id="dfAll"
                onclick="filterDesigns('all', this)"
              >
                All
              </button>
              <button
                class="filter-btn"
                id="dfFav"
                onclick="filterDesigns('fav', this)"
              >
                Favourites ★
              </button>
            </div>
          </div>
          <div class="designs-grid" id="designsGrid">
            <div class="state-msg" style="grid-column: 1/-1">
              <i class="fa-solid fa-spinner fa-spin"></i>Loading…
            </div>
          </div>
        </div>
      </div>
      <!-- /paneUsers -->
    </div>
    <!-- /page -->

    <!-- MODAL -->
    <div class="modal-overlay" id="userModal" onclick="closeModalBg(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title" id="modalTitle">User Designs</div>
          <button class="modal-close" onclick="closeModal()">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
      // Single app — archinova-41427 — auth, users, designs AND messages
      if (!firebase.apps.length)
        firebase.initializeApp({
          apiKey: "AIzaSyAgcKYuy18C6lEvfxhI_Ir_9AWPtyWj7WM",
          authDomain: "archinova-41427.firebaseapp.com",
          projectId: "archinova-41427",
          storageBucket: "archinova-41427.firebasestorage.app",
          messagingSenderId: "710524988548",
          appId: "1:710524988548:web:34526229a8ad3051c866d1",
          measurementId: "G-NG36M26981",
        });

      const auth = firebase.auth();
      const db = firebase.firestore();   // users, designs AND messages — all in archinova
      const msgDb = db;                  // alias — same project, no second app needed

      let allMessages = [],
        currentFilter = "all",
        unsubscribe = null;
      let allDesigns = [],
        allUsersMap = {},
        usersData = [],
        designFilter = "all";
      let usersLoaded = false;

      // ── AUTH GUARD ──────────────────────────────────────────────
      auth.onAuthStateChanged(async (user) => {
        if (!user) {
          window.location.href = "login.html";
          return;
        }
        const snap = await db.collection("user").doc(user.uid).get();
        if (!snap.exists || snap.data().role !== "admin") {
          await auth.signOut();
          window.location.href = "login.html";
          return;
        }
        document.getElementById("adminEmailDisplay").textContent = user.email;
        startListening();
      });

      // ── TAB SWITCH ──────────────────────────────────────────────
      function switchTab(name) {
        document
          .querySelectorAll(".dash-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-pane")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById("tab" + name).classList.add("active");
        document.getElementById("pane" + name).classList.add("active");
        if (name === "Users" && !usersLoaded) loadUsersTab();
      }

      // ══════════════════════════════════════════════
      // MESSAGES
      // ══════════════════════════════════════════════
      function startListening() {
        if (unsubscribe) unsubscribe();
        unsubscribe = msgDb
          .collection("messages")
          .orderBy("createdAt", "desc")
          .onSnapshot(
            (snap) => {
              allMessages = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
              updateMsgStats();
              renderMessages();
            },
            () => {
              document.getElementById("messagesContainer").innerHTML =
                '<div class="state-msg"><i class="fa-solid fa-triangle-exclamation" style="color:var(--red)"></i>Failed to load. Check Firestore rules.</div>';
            },
          );
      }

      function updateMsgStats() {
        const total = allMessages.length;
        const unread = allMessages.filter((m) => m.status !== "read").length;
        document.getElementById("statTotal").textContent = total;
        document.getElementById("statUnread").textContent = unread;
        document.getElementById("statRead").textContent = total - unread;
      }

      function setFilter(f, btn) {
        currentFilter = f;
        document
          .querySelectorAll("#paneMessages .filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderMessages();
      }

      function renderMessages() {
        const c = document.getElementById("messagesContainer");
        const list =
          currentFilter === "all"
            ? allMessages
            : allMessages.filter((m) =>
                currentFilter === "unread"
                  ? m.status !== "read"
                  : m.status === "read",
              );
        if (!list.length) {
          c.innerHTML =
            '<div class="state-msg"><i class="fa-regular fa-envelope-open"></i>No ' +
            (currentFilter === "all" ? "" : currentFilter + " ") +
            "messages.</div>";
          return;
        }
        c.innerHTML = list
          .map((msg) => {
            const isUnread = msg.status !== "read";
            const date = msg.createdAt?.toDate
              ? msg.createdAt.toDate().toLocaleString("en-IN", {
                  dateStyle: "medium",
                  timeStyle: "short",
                })
              : "Just now";
            return (
              '<div class="msg-card ' +
              (isUnread ? "unread" : "") +
              '" id="msg-' +
              msg.id +
              '">' +
              '<div class="msg-header"><div>' +
              '<div class="msg-name">' +
              esc(msg.firstName) +
              " " +
              esc(msg.lastName || "") +
              "</div>" +
              '<div class="msg-meta"><span><i class="fa-solid fa-envelope"></i>' +
              esc(msg.email) +
              "</span>" +
              (msg.phone
                ? '<span><i class="fa-solid fa-phone"></i>' +
                  esc(msg.phone) +
                  "</span>"
                : "") +
              "</div>" +
              "</div>" +
              '<div class="msg-right"><span class="msg-time"><i class="fa-regular fa-clock" style="margin-right:4px;"></i>' +
              date +
              "</span>" +
              '<span class="badge ' +
              (isUnread ? "badge-unread" : "badge-read") +
              '">' +
              (isUnread ? "Unread" : "Read") +
              "</span>" +
              (msg.subject
                ? '<span class="badge badge-subject">' +
                  esc(msg.subject) +
                  "</span>"
                : "") +
              "</div></div>" +
              '<div class="msg-body">' +
              esc(msg.message) +
              "</div>" +
              '<div class="msg-actions">' +
              (isUnread
                ? '<button class="btn-action mark-read" onclick="markRead(\'' +
                  msg.id +
                  '\')"><i class="fa-solid fa-check"></i> Mark as Read</button>'
                : '<button class="btn-action mark-read" onclick="markUnread(\'' +
                  msg.id +
                  '\')"><i class="fa-regular fa-envelope"></i> Mark as Unread</button>') +
              '<button class="btn-action delete-msg" onclick="deleteMsg(\'' +
              msg.id +
              '\')"><i class="fa-solid fa-trash"></i> Delete</button>' +
              "</div></div>"
            );
          })
          .join("");
      }

      function markRead(id) {
        msgDb.collection("messages").doc(id).update({ status: "read" });
      }
      function markUnread(id) {
        msgDb.collection("messages").doc(id).update({ status: "unread" });
      }
      function deleteMsg(id) {
        if (!confirm("Delete this message?")) return;
        msgDb.collection("messages").doc(id).delete();
      }

      // ══════════════════════════════════════════════
      // USERS & DESIGNS TAB
      // ══════════════════════════════════════════════
      async function loadUsersTab() {
        usersLoaded = true;
        try {
          const designsSnap = await db.collection("saved_designs").get();
          allDesigns = designsSnap.docs.map((d) => ({ id: d.id, ...d.data() }));

          // Group by userId
          const byUser = {},
            favByUser = {},
            lastByUser = {};
          allDesigns.forEach((d) => {
            const uid = d.userId || "unknown";
            byUser[uid] = (byUser[uid] || 0) + 1;
            if (d.favourite) favByUser[uid] = (favByUser[uid] || 0) + 1;
            const t = d.savedAt?.toDate ? d.savedAt.toDate() : null;
            if (t && (!lastByUser[uid] || t > lastByUser[uid]))
              lastByUser[uid] = t;
          });

          const uids = Object.keys(byUser);
          const totalFavs = allDesigns.filter((d) => d.favourite).length;

          document.getElementById("uStatUsers").textContent = uids.length;
          document.getElementById("uStatDesigns").textContent =
            allDesigns.length;
          document.getElementById("uStatFavs").textContent = totalFavs;
          document.getElementById("uStatAvg").textContent = uids.length
            ? (allDesigns.length / uids.length).toFixed(1)
            : "0";
          document.getElementById("userCount").textContent =
            uids.length + " user(s)";

          buildChart(allDesigns);

          // Fetch user profiles from "user" collection
          await Promise.all(
            uids.map(async (uid) => {
              try {
                const u = await db.collection("user").doc(uid).get();
                allUsersMap[uid] = u.exists ? u.data() : null;
              } catch (e) {
                allUsersMap[uid] = null;
              }
            }),
          );

          usersData = uids
            .map((uid) => ({
              uid,
              profile: allUsersMap[uid],
              count: byUser[uid] || 0,
              favs: favByUser[uid] || 0,
              lastDate: lastByUser[uid] || null,
            }))
            .sort((a, b) => b.count - a.count);

          renderUsers(usersData);
          renderDesigns(allDesigns);
        } catch (err) {
          console.error(err);
          document.getElementById("usersGrid").innerHTML =
            '<div class="state-msg" style="color:var(--red);">Failed to load. Check Firestore rules.</div>';
        }
      }

      // ── ACTIVITY CHART ──────────────────────────────────────────
      function buildChart(designs) {
        const chart = document.getElementById("activityChart");
        const days = [];
        const counts = {};
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          const key = d.toISOString().slice(0, 10);
          const lbl = d.toLocaleDateString("en-IN", { weekday: "short" });
          days.push({ key, lbl });
          counts[key] = 0;
        }
        designs.forEach((d) => {
          const t = d.savedAt?.toDate ? d.savedAt.toDate() : null;
          if (!t) return;
          const key = t.toISOString().slice(0, 10);
          if (key in counts) counts[key]++;
        });
        const max = Math.max(...Object.values(counts), 1);
        chart.innerHTML = days
          .map(({ key, lbl }) => {
            const val = counts[key];
            const px = Math.max(Math.round((val / max) * 90), 4);
            return (
              '<div class="bar-wrap">' +
              '<div class="bar-val">' +
              val +
              "</div>" +
              '<div class="bar" style="height:' +
              px +
              'px;"></div>' +
              '<div class="bar-label">' +
              lbl +
              "</div>" +
              "</div>"
            );
          })
          .join("");
      }

      // ── RENDER USERS ────────────────────────────────────────────
      function renderUsers(data) {
        const grid = document.getElementById("usersGrid");
        if (!data.length) {
          grid.innerHTML =
            '<div class="state-msg"><i class="fa-solid fa-user-slash"></i>No users found.</div>';
          return;
        }
        grid.innerHTML = data
          .map((u) => {
            const p = u.profile;
            const email = p?.email || u.uid.slice(0, 14) + "…";
            const fname = p?.fname || "";
            const lname = p?.lname || "";
            const name = (fname + " " + lname).trim() || email.split("@")[0];
            const initials =
              ((fname[0] || "") + (lname[0] || fname[1] || "")).toUpperCase() ||
              name.slice(0, 2).toUpperCase();
            const joined = p?.createdAt?.toDate
              ? "Joined " +
                p.createdAt
                  .toDate()
                  .toLocaleDateString("en-IN", { dateStyle: "medium" })
              : u.lastDate
                ? "Last active " +
                  u.lastDate.toLocaleDateString("en-IN", {
                    dateStyle: "medium",
                  })
                : "";
            return (
              '<div class="user-card" onclick="showUserDesigns(\'' +
              u.uid +
              "','" +
              esc(name).replace(/'/g, "\\'") +
              "')\">" +
              '<div class="user-avatar">' +
              esc(initials) +
              "</div>" +
              '<div class="user-info"><div class="user-name">' +
              esc(name) +
              "</div>" +
              '<div class="user-email">' +
              esc(email) +
              "</div>" +
              (joined
                ? '<div class="user-joined">' + esc(joined) + "</div>"
                : "") +
              "</div>" +
              '<div class="user-stats">' +
              '<div class="user-stat"><div class="user-stat-val">' +
              u.count +
              '</div><div class="user-stat-lbl">Designs</div></div>' +
              '<div class="user-divider"></div>' +
              '<div class="user-stat"><div class="user-stat-val gold">' +
              u.favs +
              '</div><div class="user-stat-lbl">Favs</div></div>' +
              '<div class="user-divider"></div>' +
              '<div class="user-stat"><i class="fa-solid fa-chevron-right" style="color:var(--muted);font-size:12px;"></i></div>' +
              "</div></div>"
            );
          })
          .join("");
      }

      function filterUsers() {
        const q = document.getElementById("userSearch").value.toLowerCase();
        const filtered = q
          ? usersData.filter((u) => {
              const email = (u.profile?.email || "").toLowerCase();
              const name = (
                (u.profile?.fname || "") +
                " " +
                (u.profile?.lname || "")
              ).toLowerCase();
              return email.includes(q) || name.includes(q);
            })
          : usersData;
        renderUsers(filtered);
      }

      // ── RENDER DESIGNS GRID ─────────────────────────────────────
      function renderDesigns(designs) {
        const grid = document.getElementById("designsGrid");
        const data =
          designFilter === "fav" ? designs.filter((d) => d.favourite) : designs;
        if (!data.length) {
          grid.innerHTML =
            '<div class="state-msg" style="grid-column:1/-1;"><i class="fa-regular fa-image"></i>No designs found.</div>';
          return;
        }
        grid.innerHTML = data
          .map((d) => {
            const p = allUsersMap[d.userId];
            const uname = p
              ? ((p.fname || "") + " " + (p.lname || "")).trim() || p.email
              : "Unknown";
            const date = d.savedAt?.toDate
              ? d.savedAt
                  .toDate()
                  .toLocaleDateString("en-IN", { dateStyle: "medium" })
              : "—";
            return (
              '<div class="design-thumb' +
              (d.favourite ? " fav" : "") +
              '">' +
              (d.imageUrl
                ? '<img src="' +
                  esc(d.imageUrl) +
                  '" alt="' +
                  esc(d.room || "Design") +
                  '" loading="lazy">'
                : '<div class="design-no-img"><i class="fa-regular fa-image"></i></div>') +
              '<div class="design-thumb-info">' +
              '<div class="design-thumb-room">' +
              esc(d.room || "Design") +
              (d.favourite ? ' <span class="fav-star">★</span>' : "") +
              "</div>" +
              '<div class="design-thumb-tags">' +
              (d.style
                ? '<span class="dtag">' + esc(d.style) + "</span>"
                : "") +
              (d.climate
                ? '<span class="dtag teal">' + esc(d.climate) + "</span>"
                : "") +
              "</div>" +
              '<div class="design-meta"><i class="fa-solid fa-user" style="font-size:10px;margin-right:4px;"></i>' +
              esc(uname) +
              "</div>" +
              '<div class="design-meta" style="margin-top:2px;">' +
              date +
              "</div>" +
              "</div></div>"
            );
          })
          .join("");
      }

      function filterDesigns(f, btn) {
        designFilter = f;
        document
          .querySelectorAll("#paneUsers .filter-row .filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderDesigns(allDesigns);
      }

      // ── USER MODAL ──────────────────────────────────────────────
      function showUserDesigns(uid, name) {
        document.getElementById("modalTitle").textContent = name + "'s Designs";
        const userDesigns = allDesigns.filter((d) => d.userId === uid);
        const body = document.getElementById("modalBody");
        if (!userDesigns.length) {
          body.innerHTML =
            '<div class="state-msg" style="padding:30px;"><i class="fa-regular fa-image"></i>No saved designs.</div>';
        } else {
          body.innerHTML =
            '<p style="font-size:13px;color:var(--muted);margin-bottom:16px;">' +
            userDesigns.length +
            " design(s) saved</p>" +
            '<div class="modal-grid">' +
            userDesigns
              .map(
                (d) =>
                  "<div>" +
                  (d.imageUrl
                    ? '<img class="modal-img" src="' +
                      esc(d.imageUrl) +
                      '" alt="' +
                      esc(d.room || "Design") +
                      '" loading="lazy">'
                    : '<div style="height:110px;background:rgba(0,0,0,0.3);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);"><i class="fa-regular fa-image"></i></div>') +
                  '<div style="padding:8px 4px;">' +
                  '<div style="font-size:13px;font-weight:500;">' +
                  esc(d.room || "Design") +
                  (d.favourite
                    ? ' <span style="color:var(--gold)">★</span>'
                    : "") +
                  "</div>" +
                  '<div style="font-size:11px;color:var(--muted);margin-top:2px;">' +
                  esc(d.style || "") +
                  (d.climate ? " · " + esc(d.climate) : "") +
                  "</div>" +
                  (d.sqft
                    ? '<div style="font-size:11px;color:rgba(0,201,167,0.6);margin-top:2px;">' +
                      esc(String(d.sqft)) +
                      " sqft</div>"
                    : "") +
                  "</div></div>",
              )
              .join("") +
            "</div>";
        }
        document.getElementById("userModal").classList.add("open");
      }

      function closeModalBg(e) {
        if (e.target === document.getElementById("userModal")) closeModal();
      }
      function closeModal() {
        document.getElementById("userModal").classList.remove("open");
      }

      // ── LOGOUT ──────────────────────────────────────────────────
      function logout() {
        if (unsubscribe) unsubscribe();
        auth.signOut().then(() => {
          window.location.href = "login.html";
        });
      }

      // ── HELPERS ─────────────────────────────────────────────────
      function esc(str) {
        if (!str) return "";
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
